<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualización de Plantillas - Restaurante Escolar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1976d2 0%, #42a5f5 100%);
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 18px;
            opacity: 0.95;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-button {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-button:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tab-button.active {
            background-color: white;
            color: #1976d2;
        }

        .preview-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .template-content {
            display: none;
        }

        .template-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 800px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
        }

        .footer-info {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>📧 Previsualización de Plantillas</h1>
        <p>Restaurante Escolar - I.E. San Antonio de Prado</p>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="showTemplate(1, this)">
            📊 Informe de Estadísticas
        </button>
        <button class="tab-button" onclick="showTemplate(2, this)">
            📈 Reporte Personalizado
        </button>
    </div>

    <div class="preview-container">
        <div id="template1" class="template-content active">
            <iframe src="informe-estadisticas.html"></iframe>
        </div>

        <div id="template2" class="template-content">
            <iframe src="reporte-personalizado.html"></iframe>
        </div>
    </div>

    <div class="footer-info">
        <p>Plantillas de Email del Sistema de Restaurante Escolar</p>
        <p style="margin-top: 10px;">backend/src/templates/emails/</p>
    </div>

    <script>
        function showTemplate(templateNum, button) {
            // Hide all templates
            document.querySelectorAll('.template-content').forEach(el => {
                el.classList.remove('active');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected template
            document.getElementById('template' + templateNum).classList.add('active');
            button.classList.add('active');
        }
    </script>
</body>

</html>
