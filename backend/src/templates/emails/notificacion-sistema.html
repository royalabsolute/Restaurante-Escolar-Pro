<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificación del Sistema - Restaurante Escolar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f8fafc; }
        .container { background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .header { background-color: #1e293b; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .footer { background-color: #f1f5f9; padding: 20px; text-align: center; font-size: 12px; color: #64748b; border-top: 1px solid #e2e8f0; }
        .button { display: inline-block; padding: 12px 24px; background-color: #3b82f6; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 20px; }
        .info-box { background-color: #f0f9ff; border: 1px solid #bae6fd; border-radius: 6px; padding: 15px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Notificación del Sistema</h2>
        </div>
        <div class="content">
            <h3>{{titulo}}</h3>
            <p>{{mensaje}}</p>
            <div class="info-box">
                {{detalle}}
            </div>
            <p>Fecha del evento: {{fecha}}</p>
        </div>
        <div class="footer">
            <p><strong>I.E. San Antonio de Prado</strong></p>
            <p>Este es un correo automático del sistema de gestión.</p>
        </div>
    </div>
</body>
</html>
